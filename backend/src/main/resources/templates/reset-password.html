<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; background: #0A0A0F; font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .card { background: #12121A; border: 1px solid #2A2A3A; border-radius: 12px; padding: 40px; }
        .logo { font-size: 24px; font-weight: bold; color: #00D4FF; text-align: center; margin-bottom: 24px; }
        h1 { color: #FFFFFF; font-size: 22px; text-align: center; margin-bottom: 12px; }
        p { color: #8A8A9A; font-size: 15px; line-height: 1.6; text-align: center; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 12px 32px; background: #00D4FF; color: #000; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 15px; }
        .footer { text-align: center; margin-top: 24px; color: #555566; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo" th:text="${brandName}">EventPro</div>
            <h1>Reset your password</h1>
            <p>We received a request to reset your password. Click the button below to choose a new password.</p>
            <div style="text-align: center;">
                <a class="btn" th:href="${link}" style="color: #000;">Reset Password</a>
            </div>
            <p style="margin-top: 20px;">If you didn't request this, you can safely ignore this email. Your password will not be changed.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 <span th:text="${brandName}">EventPro</span></p>
        </div>
    </div>
</body>
</html>
